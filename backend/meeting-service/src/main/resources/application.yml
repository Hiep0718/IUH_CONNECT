# =============================================
# Meeting Service - Application Configuration
# =============================================

server:
  port: 8088

spring:
  application:
    name: meeting-service

  # ---------- Redis ----------
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:iuh_redis_pass}

  # ---------- Kafka ----------
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: meeting-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

  # ---------- OpenFeign ----------
  cloud:
    openfeign:
      circuitbreaker:
        enabled: true

# ---------- Resilience4j ----------
resilience4j:
  circuitbreaker:
    configs:
      default:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 5s
        failureRateThreshold: 50
        eventConsumerBufferSize: 10
    instances:
      user-service:
        baseConfig: default

# ---------- JWT Configuration (shared secret with auth-service) ----------
jwt:
  secret: ${JWT_SECRET:default-dev-secret-change-in-production-must-be-at-least-256-bits}

# ---------- Actuator (Health Check) ----------
management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: "http://localhost:9411/api/v2/spans"
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

# ---------- Logging ----------
logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [%logger{36}] [traceId=%X{traceId},spanId=%X{spanId}] - %msg%n"
  level:
    com.iuhconnect: INFO
    org.springframework.web: WARN
    io.github.resilience4j: DEBUG
