# =============================================
# API Gateway - Application Configuration
# =============================================

server:
  port: 8080

spring:
  application:
    name: api-gateway

  # ---------- Redis (for Rate Limiter) ----------
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:iuh_redis_pass}

  cloud:
    gateway:
      # ---------- Route Definitions ----------
      routes:
        # -------- Auth Service (HTTP) --------
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/api/v1/auth/**,/api/v1/contacts/**,/api/v1/users/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
                key-resolver: "#{@userKeyResolver}"
            - name: CircuitBreaker
              args:
                name: authServiceCircuitBreaker
                fallbackUri: forward:/fallback/auth

        # -------- Chat Service (HTTP) --------
        - id: chat-service-http
          uri: ${CHAT_SERVICE_HTTP_URL:http://localhost:8082}
          predicates:
            - Path=/api/v1/chat/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
                key-resolver: "#{@userKeyResolver}"
            - name: CircuitBreaker
              args:
                name: chatServiceCircuitBreaker
                fallbackUri: forward:/fallback/chat

        # -------- Chat Service (WebSocket) --------
        - id: chat-service-ws
          uri: ${CHAT_SERVICE_WS_URL:ws://localhost:8082}
          predicates:
            - Path=/ws/chat/**

        # -------- Meeting Service (HTTP) --------
        - id: meeting-service-http
          uri: ${CHAT_SERVICE_HTTP_URL:http://localhost:8082}
          predicates:
            - Path=/api/v1/meetings/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
                key-resolver: "#{@userKeyResolver}"

        # -------- Meeting Web (Static page from chat-service) --------
        - id: meeting-web
          uri: ${CHAT_SERVICE_HTTP_URL:http://localhost:8082}
          predicates:
            - Path=/meeting/**

        # -------- File Upload (chat-service) --------
        - id: file-service
          uri: ${CHAT_SERVICE_HTTP_URL:http://localhost:8082}
          predicates:
            - Path=/api/v1/files/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 5
                redis-rate-limiter.burstCapacity: 10
                key-resolver: "#{@userKeyResolver}"

        # -------- Presence Service (HTTP) --------
        - id: presence-service-http
          uri: ${PRESENCE_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/v1/presence/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
                key-resolver: "#{@userKeyResolver}"

        # -------- Presence Service (WebSocket) --------
        - id: presence-service-ws
          uri: ${PRESENCE_SERVICE_WS_URL:ws://localhost:8083}
          predicates:
            - Path=/ws/presence/**

# ---------- Resilience4j Global Config ----------
resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 5s
        failureRateThreshold: 50
    instances:
      authServiceCircuitBreaker:
        baseConfig: default
      chatServiceCircuitBreaker:
        baseConfig: default

# ---------- JWT Configuration (shared secret with auth-service) ----------
jwt:
  secret: ${JWT_SECRET:IUHConnectSuperSecretKeyForJWT2024MustBeAtLeast256BitsLong!!}

# ---------- Actuator ----------
management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: "http://localhost:9411/api/v2/spans"
  endpoints:
    web:
      exposure:
        include: health,info,gateway,metrics,prometheus
  endpoint:
    gateway:
      enabled: true
    health:
      show-details: always

# ---------- Logging ----------
logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [%logger{36}] [traceId=%X{traceId},spanId=%X{spanId}] - %msg%n"
  level:
    org.springframework.cloud.gateway: INFO
    com.iuhconnect.gateway: DEBUG
    io.github.resilience4j: DEBUG
