# =============================================
# API Gateway - Application Configuration
# =============================================

server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      # ---------- Route Definitions ----------
      routes:
        # -------- Auth Service (HTTP) --------
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/api/v1/auth/**,/api/v1/contacts/**,/api/v1/users/**

        # -------- Chat Service (HTTP) --------
        - id: chat-service-http
          uri: ${CHAT_SERVICE_HTTP_URL:http://localhost:8082}
          predicates:
            - Path=/api/v1/chat/**

        # -------- Chat Service (WebSocket) --------
        - id: chat-service-ws
          uri: ${CHAT_SERVICE_WS_URL:ws://localhost:8082}
          predicates:
            - Path=/ws/chat/**

# ---------- Actuator ----------
management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    gateway:
      enabled: true

# ---------- Logging ----------
logging:
  level:
    org.springframework.cloud.gateway: DEBUG
