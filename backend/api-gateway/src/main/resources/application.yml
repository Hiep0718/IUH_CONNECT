# =============================================
# API Gateway - Application Configuration
# =============================================

server:
  port: 8080

spring:
  application:
    name: api-gateway

  # ---------- Redis (for Rate Limiter) ----------
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:iuh_redis_pass}

  cloud:
    gateway:
      # ---------- Route Definitions (Hybrid Rate Limiter) ----------
      routes:
        # ======== AUTH SERVICE ========

        # -------- Auth Public APIs (IP-based, strict — anti brute-force) --------
        - id: auth-public
          uri: ${AUTH_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/api/v1/auth/login,/api/v1/auth/register
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 3
                redis-rate-limiter.burstCapacity: 5
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@ipKeyResolver}"
            - name: CircuitBreaker
              args:
                name: authServiceCircuitBreaker
                fallbackUri: forward:/fallback/auth

        # -------- Auth Private APIs (User-based — refresh, contacts, users) --------
        - id: auth-private
          uri: ${AUTH_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/api/v1/auth/**,/api/v1/contacts/**,/api/v1/users/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 100
                redis-rate-limiter.burstCapacity: 200
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@userKeyResolver}"
            - name: CircuitBreaker
              args:
                name: authServiceCircuitBreaker
                fallbackUri: forward:/fallback/auth

        # ======== CONVERSATION SERVICE ========
        
        # -------- Conversation Service HTTP (User-based) --------
        - id: conversation-service-http
          uri: ${CONVERSATION_SERVICE_HTTP_URL:http://localhost:8090}
          predicates:
            - Path=/api/v1/chat/conversations/group/**,/api/v1/chat/conversations/user/**,/api/v1/chat/settings/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 100
                redis-rate-limiter.burstCapacity: 200
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@userKeyResolver}"
            - name: CircuitBreaker
              args:
                name: chatServiceCircuitBreaker
                fallbackUri: forward:/fallback/chat

        # ======== CHAT SERVICE ========

        # -------- Chat Service HTTP (User-based) --------
        - id: chat-service-http
          uri: ${CHAT_SERVICE_HTTP_URL:http://localhost:8082}
          predicates:
            - Path=/api/v1/chat/messages/**,/api/v1/chat/search/**,/api/v1/chat/history/**,/api/v1/chat/conversations/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 100
                redis-rate-limiter.burstCapacity: 200
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@userKeyResolver}"
            - name: CircuitBreaker
              args:
                name: chatServiceCircuitBreaker
                fallbackUri: forward:/fallback/chat

        # -------- Chat Service WebSocket (JWT-protected, no rate limit on handshake) --------
        - id: chat-service-ws
          uri: ${CHAT_SERVICE_WS_URL:ws://localhost:8082}
          predicates:
            - Path=/ws/chat/**

        # ======== MEETING SERVICE ========

        # -------- Meeting Service HTTP (User-based) --------
        - id: meeting-service-http
          uri: ${MEETING_SERVICE_HTTP_URL:http://localhost:8088}
          predicates:
            - Path=/api/v1/meetings/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 20
                redis-rate-limiter.burstCapacity: 40
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@userKeyResolver}"

        # -------- Meeting Web (Static page — no rate limit) --------
        - id: meeting-web
          uri: ${MEETING_SERVICE_HTTP_URL:http://localhost:8088}
          predicates:
            - Path=/meeting/**

        # ======== FILE SERVICE ========

        # -------- File Upload (User-based, strict — heavy IO/S3) --------
        - id: file-service
          uri: ${MEDIA_SERVICE_HTTP_URL:http://localhost:8089}
          predicates:
            - Path=/api/v1/files/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 5
                redis-rate-limiter.burstCapacity: 10
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@userKeyResolver}"

        # ======== PRESENCE SERVICE ========

        # -------- Presence Service HTTP (User-based) --------
        - id: presence-service-http
          uri: ${PRESENCE_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/v1/presence/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 30
                redis-rate-limiter.burstCapacity: 50
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@userKeyResolver}"

        # -------- Presence Service WebSocket (JWT-protected, no rate limit on handshake) --------
        - id: presence-service-ws
          uri: ${PRESENCE_SERVICE_WS_URL:ws://localhost:8083}
          predicates:
            - Path=/ws/presence/**

        # ======== AI SERVICE ========

        # -------- AI Service HTTP (User-based, very strict — heavy GPU/CPU) --------
        - id: ai-service-http
          uri: ${AI_SERVICE_URL:http://ai-service:8084}
          predicates:
            - Path=/api/v1/ai/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 2
                redis-rate-limiter.burstCapacity: 5
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@userKeyResolver}"
            - name: CircuitBreaker
              args:
                name: aiServiceCircuitBreaker
                fallbackUri: forward:/fallback/ai

# ---------- Resilience4j Global Config ----------
resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 5s
        failureRateThreshold: 50
    instances:
      authServiceCircuitBreaker:
        baseConfig: default
      chatServiceCircuitBreaker:
        baseConfig: default
      aiServiceCircuitBreaker:
        baseConfig: default
  timelimiter:
    configs:
      default:
        timeoutDuration: 120s

# ---------- JWT Configuration (shared secret with auth-service) ----------
jwt:
  secret: ${JWT_SECRET:IUHConnectSuperSecretKeyForJWT2024MustBeAtLeast256BitsLong!!}

# ---------- Actuator ----------
management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: "http://localhost:9411/api/v2/spans"
  endpoints:
    web:
      exposure:
        include: health,info,gateway,metrics,prometheus
  endpoint:
    gateway:
      enabled: true
    health:
      show-details: always

# ---------- Logging ----------
logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [%logger{36}] [traceId=%X{traceId},spanId=%X{spanId}] - %msg%n"
  level:
    org.springframework.cloud.gateway: INFO
    com.iuhconnect.gateway: DEBUG
    io.github.resilience4j: DEBUG
