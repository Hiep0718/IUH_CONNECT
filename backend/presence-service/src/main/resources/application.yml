server:
  port: 8083

spring:
  application:
    name: presence-service

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:iuh_redis_pass}

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: presence-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

# JWT Configuration (shared secret with auth-service)
jwt:
  secret: ${JWT_SECRET:IUHConnectSuperSecretKeyForJWT2024MustBeAtLeast256BitsLong!!}

# Presence Configuration
presence:
  heartbeat-timeout-seconds: 90
  cleanup-interval-seconds: 60

# ---------- Actuator (Health Check) ----------
management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: "http://localhost:9411/api/v2/spans"
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

# ---------- Logging ----------
logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [%logger{36}] [traceId=%X{traceId},spanId=%X{spanId}] - %msg%n"
  level:
    com.iuhconnect: INFO
    org.springframework.web: WARN
