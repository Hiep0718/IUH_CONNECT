# =============================================
# Chat Service - Application Configuration
# =============================================

server:
  port: 8082

spring:
  application:
    name: chat-service

  # ---------- MongoDB ----------
  data:
    mongodb:
      uri: mongodb://iuh_admin:iuh_mongo_pass@mongodb:27017/iuh_connect_db?authSource=admin
    redis:
      host: redis
      port: 6379
      password: iuh_redis_pass

  # ---------- Kafka ----------
  kafka:
    bootstrap-servers: kafka:29092
    consumer:
      group-id: chat-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

# ---------- JWT Configuration (shared secret with auth-service) ----------
jwt:
  secret: IUHConnectSuperSecretKeyForJWT2024MustBeAtLeast256BitsLong!!
