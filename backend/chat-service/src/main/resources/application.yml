# =============================================
# Chat Service - Application Configuration
# =============================================

server:
  port: 8082

spring:
  application:
    name: chat-service

  # ---------- MongoDB ----------
  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI:mongodb://iuh_admin:iuh_mongo_pass@localhost:27017/iuh_connect_db?authSource=admin}

  # ---------- MinIO ----------
  minio:
    url: ${SPRING_MINIO_URL:http://localhost:9000}
    access-key: iuh_minio_admin
    secret-key: iuh_minio_password
    bucket-name: chat-media

  # ---------- Kafka ----------
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: chat-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

# ---------- JWT Configuration (shared secret with auth-service) ----------
jwt:
  secret: IUHConnectSuperSecretKeyForJWT2024MustBeAtLeast256BitsLong!!
