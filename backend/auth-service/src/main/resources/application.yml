# =============================================
# Auth Service - Application Configuration
# =============================================

server:
  port: 8085

spring:
  application:
    name: auth-service

  # ---------- MariaDB Datasource ----------
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mariadb://localhost:3307/auth_db}
    username: ${SPRING_DATASOURCE_USERNAME:iuh_user}
    password: iuh_pass
    driver-class-name: org.mariadb.jdbc.Driver

  # ---------- JPA / Hibernate ----------
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect
        format_sql: true

  # ---------- Kafka Producer ----------
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

# ---------- JWT Configuration ----------
jwt:
  secret: IUHConnectSuperSecretKeyForJWT2024MustBeAtLeast256BitsLong!!
  access-expiration-ms: 900000       # 15 minutes
  refresh-expiration-ms: 604800000   # 7 days
