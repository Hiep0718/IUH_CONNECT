# =============================================
# Auth Service - Application Configuration
# =============================================

server:
  port: 8085

spring:
  application:
    name: auth-service

  # ---------- MariaDB Datasource ----------
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mariadb://localhost:3307/auth_db}
    username: ${SPRING_DATASOURCE_USERNAME:iuh_user}
    password: iuh_pass
    driver-class-name: org.mariadb.jdbc.Driver

  # ---------- JPA / Hibernate ----------
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect
        format_sql: true

  # ---------- Kafka Producer ----------
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

# ---------- JWT Configuration ----------
jwt:
  secret: IUHConnectSuperSecretKeyForJWT2024MustBeAtLeast256BitsLong!!
  access-expiration-ms: 900000       # 15 minutes
  refresh-expiration-ms: 604800000   # 7 days

# ---------- Actuator (Health Check) ----------
management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: "http://localhost:9411/api/v2/spans"
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

# ---------- Logging ----------
logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [%logger{36}] [traceId=%X{traceId},spanId=%X{spanId}] - %msg%n"
  level:
    com.iuhconnect: INFO
    org.springframework.web: WARN
