# =============================================
# Media Service - Application Configuration
# =============================================

server:
  port: 8089

spring:
  application:
    name: media-service

  # ---------- Redis (Optional, maybe for rate limit) ----------
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:iuh_redis_pass}

# ---------- Resilience4j ----------
resilience4j:
  circuitbreaker:
    configs:
      default:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 5s
        failureRateThreshold: 50
        eventConsumerBufferSize: 10

# ---------- JWT Configuration (shared secret with auth-service) ----------
jwt:
  secret: ${JWT_SECRET:default-dev-secret-change-in-production-must-be-at-least-256-bits}

# ---------- Actuator (Health Check) ----------
management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: "http://localhost:9411/api/v2/spans"
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

# ---------- Logging ----------
logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [%logger{36}] [traceId=%X{traceId},spanId=%X{spanId}] - %msg%n"
  level:
    com.iuhconnect: INFO
    org.springframework.web: WARN

# ---------- AWS S3 ----------
aws:
  s3:
    region: ${AWS_REGION:ap-southeast-1}
    bucket-name: ${AWS_S3_BUCKET:iuh-connect-media-bucket}
    access-key: ${AWS_ACCESS_KEY_ID:dummy-access-key}
    secret-key: ${AWS_SECRET_ACCESS_KEY:dummy-secret-key}
